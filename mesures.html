<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnet de mesure</title>
    <link rel="stylesheet" href="style_mesures.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
            <div class="logo-row">
                <div class="logo-box"><i class="ti ti-notebook"></i></div>
                <p>Prendre une mesure</p>
            </div>
            <button class="menu-burger" id="burger-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-links" id="nav-links">
                <li><a href="#">Prendre une mesure</a></li>
                <li><a href="mesures.html">Carnet de mesures</a></li>
                <li><a href="index.html">Acceuil</a></li>
            </ul>
        </nav>

    <h2>Suivi des analyses de l'eau</h2>
    <div id="loading" class="loading">Chargement des données...</div>
    
    <table id="tableau-donnees" style="display:none;">
        <thead>
            <tr>
                <th></th>
                <th>DATE & HEURE</th>
                <th>CHLORE</th>
                <th>pH</th>
                <th>ALCALINITE</th>
            </tr>
        </thead>
        <tbody id="corps-tableau">
            </tbody>
    </table>

    <script>
        // Remplacer par l'URL obtenue lors du déploiement de l'Apps Script
        const urlAppScript = "https://script.google.com/macros/s/AKfycbzjf-IBRqf-Kt6YNoonyonIXVvGPEW2RyVkeaqbS65WnJKbfP9zXTMUEgha96B-QVVc/exec";


        async function chargerDonnees() {
            try {
                // Appel de l'API Apps Script
                const response = await fetch(urlAppScript);
                const donnees = await response.json();
                
                const corpsTableau = document.getElementById('corps-tableau');
                
                // Construire les lignes du tableau HTML
                donnees.forEach(ligne => {
                    const tr = document.createElement('tr');
                    
                    // Gérer les cases potentiellement vides (ex: Chlore vide à la ligne 2)
                    const chlore = ligne.chlore !== "" ? ligne.chlore : "-";
                    const ph = ligne.ph !== "" ? ligne.ph : "-";
                    const alcalinite = ligne.alcalinite !== "" ? ligne.alcalinite : "-";

                    tr.innerHTML = `
    <td>
        <button class="delete-btn" onclick="supprimerMesure(${ligne.rowId})">
            <i class="ti ti-xbox-x"></i>
        </button>
    </td>
    <td>${ligne.date}</td>
    <td>${chlore}</td>
    <td>${ph}</td>
    <td>${alcalinite}</td>
`;
corpsTableau.appendChild(tr);
                });

                // Masquer le message de chargement et afficher le tableau
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tableau-donnees').style.display = 'table';

            } catch (error) {
                console.error("Erreur lors du chargement :", error);
                document.getElementById('loading').innerText = "Erreur de chargement des données.";
            }
        
                // Ajouter un écouteur de clic sur chaque ligne
        document.querySelectorAll('#corps-tableau tr').forEach(tr => {
        tr.addEventListener('click', function(e) {
        // Ne pas déclencher si on clique directement sur le bouton supprimer
        if (e.target.closest('.delete-btn')) return;
        
        // Retirer la sélection sur toutes les autres lignes
        document.querySelectorAll('#corps-tableau tr').forEach(autreTr => {
            autreTr.classList.remove('selectionnee');
        });
        
        // Ajouter la sélection sur la ligne cliquée
        this.classList.toggle('selectionnee');
    });
});}





        async function supprimerMesure(rowId) {

    const confirmation = confirm(
        "Voulez-vous supprimer cette mesure ?"
    );

    if (!confirmation) return;

    try {

        const response = await fetch(urlAppScript, {
            method: "POST",
            body: JSON.stringify({
                action: "delete",
                rowId: rowId
            })
        });

        const resultat = await response.json();

        if (resultat.result === "success") {

            location.reload();

        } else {

            alert("Erreur de suppression");
        }

    } catch (error) {

        console.error(error);
        alert("Erreur réseau");
    }
}

        // Lancer le chargement au chargement de la page
        window.onload = chargerDonnees;
        const burger = document.getElementById('burger-menu');
const navLinks = document.getElementById('nav-links');

burger.addEventListener('click', () => {
  burger.classList.toggle('open');
  navLinks.classList.toggle('active');
});
    </script>
</body>
</html>
