<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Piscine</title>
    <link rel="stylesheet" href="style_acceuil.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/tabler-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon-96x96.png?v=2" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <link rel="shortcut icon" href="favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2" />
    <meta name="apple-mobile-web-app-title" content="Piscine" />
    <link rel="manifest" href="site.webmanifest?v=2" />
</head>

<body>
    <div class="entete">
        <div class="logo-row">
            <div class="logo-box"><i class="ti ti-pool"></i></div>
            <p>Ma piscine</p>
        </div>
        <div class="meteo">
            <div id="meteo"></div>
            <i id="weather-icon"></i>
        </div>
    </div>
    <div class="huge-icon"><i class="ti ti-pool badge"></i></div>
    <div class="state-report">
        <span class="hero-title">Tout va bien !</span>
        <span class="hero-text" id="date-mesure">Chargement ...</span>
        <div class="hero-span"></div>
        <div class="hero-arc"></div>
    </div>
    <div class="corps">
        <div class="cards">
            <div class="carte">
                <div class="titre">Chlore</div>
                <div class="mesure" id="chlore-value">--</div>
                <div class="unité">mg/L</div>
            </div>
            <div class="carte">
                <div class="titre">pH</div>
                <div class="mesure" id="ph-value">--</div>
                <div class="unité">mg/L</div>
            </div>
            <div class="carte">
                <div class="titre">Alcalinité</div>
                <div class="mesure" id="alcalinite-value">--</div>
                <div class="unité">mg/L</div>
            </div>
        </div>
        <div>
            <h2>RECOMMENDATION</h2>
            <div class="alert-card">
                <div class="logo-box" style="background-color: #d0f5d8 ;"><i class="ti ti-circle-check"
                        style="color:#1a7f37 ; font-size: 19px;"></i></div>
                <div id="alert-box">
                    <div class="alert-title" id="alert-title" style="display: none;">pH trop élevé</div>
                    <div class="alert-text" style="display: none;">Ajouter ce que vous voulez. De tout de façon ça ne changera rien</div>
                </div>
            </div>
        </div>
        <div>
            <h2>ACTIONS RAPIDES</h2>
            <div class="line-cards">
                <a href="selecteur.html" class="lien-carte">
                    <div class="carte1">
                        <i class="ti ti-plus icone"></i>
                        <div class="action-text">Prendre une <br> mesure</div>
                    </div>
                </a>
                <a href="mesures.html" class="lien-carte">
                    <div class="carte1">
                        <i class="ti ti-notebook icone"></i>
                        <div class="action-text">Carnet de<br> mesure</div>
                    </div>
                </a>
                <a href="selecteur.html" class="lien-carte">
                    <div class="carte1">
                        <i class="ti ti-report-analytics icone"></i>
                        <div class="action-text">Mesure <br>avancée</div>
                    </div>
                </a>
            </div>
        </div>
    </div>
    <script>
        function ChargerMeteo(){
            const apiKey = "af5ef4c8c41532ea9cc149e2f0cc37c3";
            const city = "Tongrinne";
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=fr`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    let temp = data.main.temp.toFixed(0);
                    const blocAlert = `<p class="meteoText">${temp}°C - ${data.weather[0].description}</p>`
                    document.getElementById("meteo").insertAdjacentHTML('beforeend', blocAlert);
                    const tablerClasses = {
                        "01d": "ti-sun",
                        "01n": "ti-moon",
                        "02d": "ti-cloud-sun",
                        "02n": "ti-cloud-moon",
                        "03d": "ti-cloud",
                        "03n": "ti-cloud",
                        "04d": "ti-cloud",
                        "04n": "ti-cloud",
                        "09d": "ti-cloud-rain",
                        "09n": "ti-cloud-rain",
                        "10d": "ti-cloud-sun-rain",
                        "10n": "ti-cloud-moon-rain",
                        "11d": "ti-cloud-storm",
                        "11n": "ti-cloud-storm",
                        "13d": "ti-snowflake",
                        "13n": "ti-snowflake",
                        "50d": "ti-mist",
                        "50n": "ti-mist"
                    };

                    // Utilisation dans votre fonction Fetch :
                    let iconCode = data.weather[0].icon;
                    let className = tablerClasses[iconCode] || "ti-thermometer";

                    // On applique la classe sur votre balise <i> dans le HTML
                    document.getElementById("weather-icon").className = `ti ${className}`;
                })
                .catch(error => console.error("Erreur :", error));
        };
        function AjouterAlerte (titre){
            const blocAlert = `<div class="alert-title">${titre}</div>`
            document.getElementById("alert-box").insertAdjacentHTML('beforeend', blocAlert);

        }

        function AjouterTextAlerte (text){
            const blocAlert = `<div class="alert-text">${text}</div>`
            document.getElementById("alert-box").insertAdjacentHTML('beforeend', blocAlert);

        }
        
        async function chargerDerniereMesure() {

            const url = "https://script.google.com/macros/s/AKfycbzjf-IBRqf-Kt6YNoonyonIXVvGPEW2RyVkeaqbS65WnJKbfP9zXTMUEgha96B-QVVc/exec";

            try {

                const response = await fetch(url);
                const data = await response.json();

                if (!data || data.length === 0) {
                    console.log("Aucune donnée");
                    return;
                }

                const derniereMesure = data[data.length - 1];

                document.getElementById("chlore-value").textContent =
                    derniereMesure.chlore || "--";

                document.getElementById("ph-value").textContent =
                    derniereMesure.ph || "--";

                document.getElementById("alcalinite-value").textContent =
                    derniereMesure.alcalinite || "--";

                const [jour, mois, annee] = derniereMesure.date.split(" ")[0].split("/");
                const dateMesure = new Date(annee, mois - 1, jour);

                const aujourdHui = new Date();

                let texteDate;

                if (
                    dateMesure.getDate() === aujourdHui.getDate() &&
                    dateMesure.getMonth() === aujourdHui.getMonth() &&
                    dateMesure.getFullYear() === aujourdHui.getFullYear()
                ) {
                    texteDate = "Aujourd'hui";
                } else {
                    texteDate = dateMesure.toLocaleDateString("fr-FR", {
                        day: "numeric",
                        month: "long",
                        year: "numeric"
                    });
                }

                document.getElementById("date-mesure").textContent =
                    "Dernière mesure · " + texteDate;

                switch (derniereMesure.chlore){
                    case '0': 
                        AjouterAlerte("Le niveau de chlore est trop bas.");
                        AjouterTextAlerte("Rajouter 100 grammes de chlore solide.");
                        break;
                    case '0.5': 
                        AjouterAlerte("Le niveau de chlore est trop bas.");
                        AjouterTextAlerte("Rajouter 20 grammes de chlore solide.");
                        break;
                    case '3': 
                        AjouterAlerte("Le niveau de chlore est trop haut.");
                        AjouterTextAlerte("Il faut attendre que le niveau de chlore descende naturelement.");
                        break;
                    case '5': 
                        AjouterAlerte("Le niveau de chlore est trop haut.");
                        AjouterTextAlerte("Il faut attendre que le niveau de chlore descende naturelement.");
                        break;
                    case '10': 
                        AjouterAlerte("Le niveau de chlore est trop haut.");
                        AjouterTextAlerte("Il faut attendre que le niveau de chlore descende naturelement.");
                        break;
                    
                }

                switch (derniereMesure.ph){
                    case '6,2': 
                        AjouterAlerte("Le pH de l'eau est trop bas.");
                        AjouterTextAlerte("Ajouter 720 mL de pH Maxi.");
                        break;
                    case '6,8': 
                        AjouterAlerte("Le pH de l'eau est trop bas.");
                        AjouterTextAlerte("Ajouter 240 mL de pH Maxi.");
                        break;
                    case '7,8': 
                        AjouterAlerte("Le pH de l'eau est trop haut.");
                        AjouterTextAlerte("Ajouter 300 grammes de pH Mini.");
                        break;
                    case '8,4': 
                        AjouterAlerte("Le pH de l'eau est trop haut.");
                        AjouterTextAlerte("Ajouter 1,8 kilo de pH Mini.");
                        break;
                    
                }
                

            } catch (error) {
                console.error("Erreur :", error);
            }
        }

        chargerDerniereMesure();
        ChargerMeteo();
    </script>
</body>

</html>
