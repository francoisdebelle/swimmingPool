<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Piscine</title>
    <link rel="stylesheet" href="style_acceuil.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/tabler-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="entete">
        <div class="logo-row">
            <div class="logo-box"><i class="ti ti-pool"></i></div>
            <p>Ma piscine</p>
        </div>
        <div class="meteo"><p>Meteo</p></div>
    </div>
    <div class="huge-icon"><i class="ti ti-pool badge"></i></div>
    <div class="state-report">
        <span class="hero-title">Tout va bien !</span>
        <span class="hero-text">Dernière mesure · aujourd'hui à 09 h 42</span>
        <div class="hero-span"></div>
        <div class="hero-arc"></div>    
    </div>
    <div class="corps">
        <div class="cards">
            <div class="carte">
                <div class="titre">Chlore</div>
                <div class="mesure">1,0</div>
                <div class="unité">mg/L</div>
            </div>
            <div class="carte">
                <div class="titre">pH</div>
                <div class="mesure">7,2</div>
                <div class="unité">mg/L</div>
            </div>
            <div class="carte">
                <div class="titre">Alcalinité</div>
                <div class="mesure">4,0</div>
                <div class="unité">mg/L</div>
            </div>
        </div>
        <div>
            <h2>RECOMMENDATION</h2>
            <div class="alert-card">
                <div class="logo-box" style="background-color: #fde9b8;"><i class="ti ti-flask" style="color:#c07800; font-size: 19px;"></i></div>
                <div>
                <div class="alert-title">pH trop élevé</div>
                <div class="alert-text">Ajouter ce que vous voulez. De tout de façon ça ne changera rien</div>
                </div>
            </div>
        </div>
        <div>
            <h2>ACTIONS RAPIDES</h2>
            <div class="line-cards">
                <a href="index.html" class="lien-carte">
                    <div class="carte1">
                        <i class="ti ti-plus icone"></i>
                        <div class="action-text">Prendre une <br> mesure</div>
                    </div>
                </a>
                <a href="mesures.html" class="lien-carte">
                    <div class="carte1">
                        <i class="ti ti-notebook icone"></i>
                        <div class="action-text">Carnet de<br> mesure</div>
                    </div>
                </a>
                <a href="index.html" class="lien-carte">
                    <div class="carte1">
                        <i class="ti ti-report-analytics icone"></i>
                        <div class="action-text">Mesure <br>avancée</div>
                    </div>
                </a>
            </div>
        </div>
    </div>
    
</body>
</html>
